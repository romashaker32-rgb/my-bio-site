<!DOCTYPE html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>deko4ka - Bio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
body {
  margin:0;
  font-family:'Outfit',sans-serif;
  color:white;
  padding:40px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:24px;
  perspective:1000px;
  background:black;
}
.video-bg {
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  z-index:-1;
}
.bio-wrapper {
  transition:transform 0.15s ease;
  transform-style:preserve-3d;
  width:100%;
  max-width:720px;
}
.card, .block {
  background:rgba(10,10,10,0.95);
  border-radius:24px;
  padding:32px;
  width:100%;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  transition:all 0.3s ease;
  margin-bottom:24px;
}
.banner {width:100%;height:140px;border-radius:20px;background:url('banner.jpg') center/cover no-repeat;margin-bottom:-50px;}
.ghost-container {position:relative;width:104px;height:104px;margin:0 auto;}
.ghost-ring {position:absolute;top:-20px;left:-20px;width:144px;height:144px;background:url('https://r2.fakecrime.bio/assets/decorations/ghosts.gif') no-repeat center;background-size:contain;z-index:0;animation:ghost-ring 6s linear infinite;}
.avatar {width:104px;height:104px;border-radius:50%;background:url('avatar.png') center/cover no-repeat;border:3px solid white;position:relative;z-index:1;}
.username {text-align:center;font-size:28px;font-weight:bold;margin-top:20px;color:white;text-shadow:0 0 6px rgba(255,255,255,0.9);}
.tag-buttons {display:flex;gap:12px;margin:20px auto;justify-content:center;flex-wrap:wrap;}
.tag-button {border:1px solid rgba(255,255,255,0.3);padding:6px 14px;border-radius:20px;font-size:11px;font-family:'Orbitron',sans-serif;color:white;text-transform:uppercase;font-weight:900;background:rgba(255,255,255,0.05);cursor:pointer;transition:all 0.3s ease;}
.tag-button:hover {background:rgba(255,255,255,0.15);border-color:white;transform:scale(1.15);}
.location {text-align:center;opacity:0.6;margin-top:16px;}
.link-box, .music-card {background:rgba(10,10,10,0.5)!important;backdrop-filter:blur(10px);border-radius:24px;box-shadow:0 0 40px rgba(0,0,0,0.6);transition:all 0.3s ease;}
@keyframes ghost-ring{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes pulse{0%{text-shadow:0 0 4px rgba(255,255,255,0.6)}50%{text-shadow:0 0 12px rgba(255,255,255,1)}100%{text-shadow:0 0 4px rgba(255,255,255,0.6)}}
</style>
</head>
<body>
               <!-- ФОТО -->
<video class="video-bg" autoplay muted loop playsinline>
               <!-- ФОН -->
  <source src="фон.mp4" type="video/mp4">
</video>

<div class="bio-wrapper" id="bioCard">
               <!-- СТАТИСТИКА -->
  <div style="position:absolute;top:12px;right:16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:6px 14px;font-size:10px;font-family:'Orbitron',sans-serif;color:white;text-transform:uppercase;letter-spacing:0.05em;font-weight:900;box-shadow:0 0 8px rgba(255,255,255,0.15);backdrop-filter:blur(6px)">
    VIEWERS: <span id="viewerCount">117</span>
  </div>

  <div class="card">
    <div class="banner"></div>
    <div class="ghost-container">
      <div class="ghost-ring"></div>
      <div class="avatar"></div>
    </div>
               <!-- НИКНЕЙМ & ТЕГИ -->
    <div class="username">deko4ka</div>
    <div class="tag-buttons">
      <div class="tag-button">STUDENT</div>
      <div class="tag-button">TIKTOKER</div>
    </div>
               <!-- ОПИСАНИЕ -->
    <div class="tags">
      <div style="text-align:center;line-height:1.6;font-size:0.92rem;font-family:'Orbitron',sans-serif;border-radius:12px;padding:10px 16px;white-space:pre-line;letter-spacing:0.03em;font-weight:900;color:white">
        Hi, my nickname is deko4ka
        I'm the owner of FrizeDev Studio

        I'm a student, a TikToker, and a YouTuber

        I'm coding HTML and CSS
        I'm learning to write websites
        My goal is to write large websites
      </div>
    </div>

    <div class="location" style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px">
      <img alt="location" src="location-filled-svgrepo-com.svg" style="width:20px;height:20px;filter:drop-shadow(0 0 8px rgba(255,255,255,0.7));opacity:0.8"/>
               <!-- ВАШ ГОРОД -->
      <div class="rainbow-text">Amsterdam</div>
    </div>
  </div>

  <div class="block music-card" style="text-align: center; padding: 24px;">
    <strong style="font-size: 18px;">ᴅᴇᴋᴏ𝟦ᴋᴀ</strong><br/>
    <small style="opacity: 0.8;">Владелец FrizeDev</small>
    <br/><br/>
    <audio controls style="width: 100%; max-width: 480px; outline: none; border-radius: 10px;">
      <source src="light cornerprod.ogg" type="audio/ogg">
      Ваш браузер не поддерживает воспроизведение аудио.
    </audio>
  </div>

</div>

<script>
const card=document.getElementById('bioCard');
card.addEventListener('mousemove',e=>{
  const r=card.getBoundingClientRect();
  const x=e.clientX-r.left;
  const y=e.clientY-r.top;
  const cx=r.width/2;
  const cy=r.height/2;
  card.style.transform=`rotateX(${-(y-cy)/20}deg) rotateY(${(x-cx)/20}deg) scale(1.02)`;
});
card.addEventListener('mouseleave',()=>{card.style.transform='rotateX(0deg) rotateY(0deg) scale(1)'});
</script>

</body>
</html>
